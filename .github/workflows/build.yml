name: Build macOS DMG

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to create/update releases

jobs:
  build:
    name: Build & Package DMG
    runs-on: macos-15  # Xcode 16 default — required for xcodegen objectVersion 77

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # xcodegen turns project.yml into a real .xcodeproj
      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build Release (ad-hoc, no signing)
        run: |
          xcodebuild build \
            -scheme CybexsoftNotify \
            -configuration Release \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Locate built .app
        id: app
        run: |
          APP=$(find "$PWD/build/DerivedData" -name "CybexsoftNotify.app" -type d | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $APP"

      - name: Create DMG
        run: |
          mkdir -p dist
          hdiutil create \
            -volname "CybexsoftNotify" \
            -srcfolder "${{ steps.app.outputs.path }}" \
            -ov \
            -format UDZO \
            "dist/CybexsoftNotify.dmg"
          ls -lh dist/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CybexsoftNotify-macOS-${{ github.sha }}
          path: dist/CybexsoftNotify.dmg
          retention-days: 30

      # Every push to main updates the "latest" pre-release — always downloadable
      - name: Update latest pre-release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          prerelease: true
          make_latest: false
          files: dist/CybexsoftNotify.dmg
          body: |
            Auto-updated on every push to `main`.
            Built from commit ${{ github.sha }}.

            > **First-time install on macOS:** right-click → Open to bypass Gatekeeper (app is not notarized).

      # Push a version tag (v1.0.0 …) to create a proper stable release
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CybexsoftNotify.dmg
          make_latest: true
          generate_release_notes: true
